<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AccessControlManager Demo</title>

  <!-- Pico.css (CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

  <!-- overrides -->
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>
  <main class="container">
    <header>
      <h1>AccessControlManager Demo</h1>
      <p>Interactive demo UI for AccessControlManager reports (backend API hosted privately).</p>
    </header>

    <section>
      <label for="dataset">Preset / example input</label>
      <select id="dataset">
        <option value="A" selected>Dataset A (baseline)</option>
        <option value="B">Dataset B (no violations)</option>
        <option value="C">Dataset C (no warnings)</option>
        <option value="D">Dataset D (no rules)</option>
      </select>

      <div class="grid" style="margin-top: 1rem;">
        <!-- Keep IDs the same so main.js works -->
        <button id="btnViolations" type="button">Get violations</button>
        <button id="btnWarnings" type="button">Get warnings</button>
        <button id="btnRules" type="button">Get all rules</button>
      </div>
    </section>

    <section style="margin-top: 1rem;">
      <details>
        <summary>Check permissions for specific user</summary>

        <div class="grid" style="margin-top: 1rem;">
          <label>
            Username (e.g., alpha)
            <input id="user" type="text" placeholder="e.g., user / id / name">
          </label>

          <label>
            Action (e.g., delete)
            <input id="action" type="text" placeholder="e.g., action / type">
          </label>

          <label>
            Resource (e.g., Notes.Specialist.Cardiology)
            <input id="resource" type="text" placeholder="e.g., resource / item">
          </label>
        </div>

        <button id="btnPermissions" type="button" style="margin-top: 0.5rem;">Check Permissions</button>
      </details>
    </section>

    <section style="margin-top: 1.25rem;">
      <h2>Output</h2>
      <pre id="output" class="output">Loading…</pre>
    </section>

    <footer style="margin-top: 1.25rem; opacity: 0.9;">
      <small>Built with Pico.css. Demo frontend for AccessControlManager.</small>
    </footer>
  </main>

  <!-- JS -->
  <script src="./js/config.js"></script>
  <script src="./js/api.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
